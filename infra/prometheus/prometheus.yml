# Prometheus scrape config (local/dev). The backend exposes /metrics when
# PROMETHEUS_ENABLED=true. TODO(phase-6): add the worker exporter target.

global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "opportunitypulse-backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
