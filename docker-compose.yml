# OpportunityPulse local/dev stack.
#   docker compose config            # validate
#   docker compose up -d db redis    # infra only
#   docker compose up --build        # full stack
#
# Production deploys build the same images via .github/workflows/deploy.yml.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: opp
      POSTGRES_PASSWORD: opp
      POSTGRES_DB: opportunitypulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opp -d opportunitypulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://opp:opp@db:5432/opportunitypulse
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://opp:opp@db:5432/opportunitypulse
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: arq worker.arq_app.WorkerSettings

  web:
    build:
      context: ./web
      dockerfile: ../infra/docker/web.Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev

volumes:
  pgdata:
  redisdata:
