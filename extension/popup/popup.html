<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      body { width: 300px; font: 13px system-ui, sans-serif; margin: 0; padding: 14px; background: #fafafa; }
      h1 { font-size: 15px; margin: 0 0 12px; color: #0070f3; }
      .score { font-size: 36px; font-weight: 700; color: #1a73e8; margin: 8px 0; }
      .breakdown { color: #555; font-size: 12px; min-height: 24px; }
      .divider { border: none; border-top: 1px solid #eee; margin: 12px 0; }
      label { font-size: 12px; color: #888; }
      input { width: 100%; padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px; font: 12px system-ui; box-sizing: border-box; margin: 4px 0 6px; }
      .row { display: flex; gap: 6px; }
      button { padding: 6px 12px; border-radius: 5px; border: 1px solid #ddd; cursor: pointer; font: 12px system-ui; background: white; }
      button.primary { background: #0070f3; color: white; border-color: #0070f3; }
      button:disabled { opacity: 0.5; cursor: default; }
      #status { font-size: 11px; color: #137333; min-height: 14px; margin-top: 2px; }
    </style>
  </head>
  <body>
    <h1>⚡ OpportunityPulse</h1>
    <div class="score" id="score">—</div>
    <div class="breakdown" id="breakdown">Open a supported listing to see your match score.</div>
    <hr class="divider" />
    <label for="user-id">Your user ID (from profile page)</label>
    <input type="text" id="user-id" placeholder="paste your user_id here" />
    <div class="row">
      <button id="user-id-save" class="primary">Save ID</button>
      <button id="save" disabled>View in app</button>
    </div>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
